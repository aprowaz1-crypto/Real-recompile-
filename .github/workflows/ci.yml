name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-native:
    name: Runtime Native (Linux)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate scripts
        run: |
          chmod +x scripts/*.sh
          bash -n scripts/*.sh

      - name: Setup dependencies
        run: ./scripts/setup_codespace.sh

      - name: Build runtime (native)
        run: ./scripts/build_runtime_native.sh

      - name: Upload native runtime build
        uses: actions/upload-artifact@v4
        with:
          name: runtime-linux
          path: build/runtime-linux

  runtime-wine:
    name: Runtime Windows (MinGW/Wine)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate scripts
        run: |
          chmod +x scripts/*.sh
          bash -n scripts/*.sh

      - name: Build runtime (wine target)
        run: ./scripts/build_runtime_wine.sh

      - name: Upload windows runtime build
        uses: actions/upload-artifact@v4
        with:
          name: runtime-windows
          path: build/runtime-windows

  xenon-pipeline:
    name: Xenon Pipeline (Generate C++)
    runs-on: ubuntu-24.04
    env:
      XEX_PATH: default.xex
      XENON_REPO_URL: https://github.com/hedge-dev/XenonRecomp.git
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check XEX presence
        id: check_xex
        run: |
          if [ -f "$XEX_PATH" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "[info] default.xex is missing, skipping xenon-pipeline steps"
          fi

      - name: Validate scripts
        if: steps.check_xex.outputs.exists == 'true'
        run: |
          chmod +x scripts/*.sh
          bash -n scripts/*.sh

      - name: Setup dependencies
        if: steps.check_xex.outputs.exists == 'true'
        run: ./scripts/setup_codespace.sh

      - name: Build Xenon tools
        if: steps.check_xex.outputs.exists == 'true'
        run: ./scripts/build_xenon_tools.sh

      - name: Analyse XEX
        if: steps.check_xex.outputs.exists == 'true'
        run: ./scripts/analyse_xex.sh "$XEX_PATH"

      - name: Recompile XEX
        if: steps.check_xex.outputs.exists == 'true'
        run: ./scripts/recompile_xex.sh "$XEX_PATH"

      - name: Find unimplemented
        if: steps.check_xex.outputs.exists == 'true'
        run: ./scripts/find_unimplemented.sh

      - name: Build generated target
        id: build_generated
        if: steps.check_xex.outputs.exists == 'true'
        continue-on-error: true
        run: ./scripts/build_generated_native.sh

      - name: Auto-fix generated labels
        if: steps.check_xex.outputs.exists == 'true' && steps.build_generated.outcome == 'failure'
        run: ./scripts/fix_generated_labels.sh

      - name: Retry generated build
        if: steps.check_xex.outputs.exists == 'true' && steps.build_generated.outcome == 'failure'
        continue-on-error: true
        run: ./scripts/build_generated_native.sh

      - name: Build generated Windows runner (.exe)
        if: steps.check_xex.outputs.exists == 'true'
        continue-on-error: true
        run: ENABLE_RUNNER=ON ./scripts/build_generated_wine.sh

      - name: Build generated native runner
        if: steps.check_xex.outputs.exists == 'true'
        run: ENABLE_RUNNER=ON ./scripts/build_generated_native.sh

      - name: Runner smoke test
        if: steps.check_xex.outputs.exists == 'true'
        run: ./scripts/smoke_runner.sh

      - name: Upload analysis artifacts
        if: steps.check_xex.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: analysis-artifacts
          path: artifacts/analysis

      - name: Upload generated sources
        if: steps.check_xex.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: generated-sources
          path: artifacts/generated

      - name: Upload reports
        if: steps.check_xex.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: artifacts/reports

      - name: Upload generated runner exe
        if: steps.check_xex.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: generated-runner-windows
          path: build/generated-windows/recompiled_runner.exe
          if-no-files-found: warn
