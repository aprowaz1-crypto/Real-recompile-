name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  REXGLUE_SDK_VERSION: v0.1.2
  SDK_URL_LINUX: https://github.com/rexglue/rexglue-sdk/releases/download/v0.1.2/rexglue-sdk-linux-amd64.zip
  SDK_URL_WIN: https://github.com/rexglue/rexglue-sdk/releases/download/v0.1.2/rexglue-sdk-win-amd64.zip

jobs:
  build-linux:
    name: Build Linux (Clang 18 + Vulkan)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang-18 lld-18 ninja-build cmake \
            libgtk-3-dev libvulkan-dev libx11-xcb-dev libxcb1-dev \
            unzip

      - name: Cache rexglue-sdk
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: third_party/rexglue-sdk/linux-amd64
          key: rexglue-sdk-linux-${{ env.REXGLUE_SDK_VERSION }}

      - name: Download rexglue-sdk
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p third_party/rexglue-sdk
          curl -L -o /tmp/sdk.zip "$SDK_URL_LINUX"
          unzip -qo /tmp/sdk.zip -d third_party/rexglue-sdk
          rm /tmp/sdk.zip

      - name: Codegen (generate C++ from XEX)
        run: |
          if [ -f "default.xex" ]; then
            chmod +x third_party/rexglue-sdk/linux-amd64/bin/rexglue
            third_party/rexglue-sdk/linux-amd64/bin/rexglue codegen realrecompile_config.toml
          else
            echo "default.xex not found, using pre-generated code"
          fi

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Verify executable
        run: |
          file build/realrecompile
          ls -lh build/realrecompile

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: realrecompile-linux-amd64
          path: build/realrecompile

  codegen-only:
    name: Codegen Pipeline
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check XEX presence
        id: check_xex
        run: |
          if [ -f "default.xex" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "[info] default.xex is missing, skipping codegen"
          fi

      - name: Cache rexglue-sdk
        if: steps.check_xex.outputs.exists == 'true'
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: third_party/rexglue-sdk/linux-amd64
          key: rexglue-sdk-linux-${{ env.REXGLUE_SDK_VERSION }}

      - name: Download rexglue-sdk
        if: steps.check_xex.outputs.exists == 'true' && steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p third_party/rexglue-sdk
          curl -L -o /tmp/sdk.zip "$SDK_URL_LINUX"
          unzip -qo /tmp/sdk.zip -d third_party/rexglue-sdk
          rm /tmp/sdk.zip

      - name: Run codegen
        if: steps.check_xex.outputs.exists == 'true'
        run: |
          chmod +x third_party/rexglue-sdk/linux-amd64/bin/rexglue
          third_party/rexglue-sdk/linux-amd64/bin/rexglue codegen realrecompile_config.toml

      - name: Upload generated sources
        if: steps.check_xex.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: generated-sources
          path: generated/

  build-windows:
    name: Build Windows (Clang + D3D12)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM/Clang
        run: choco install llvm ninja -y --no-progress

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Cache rexglue-sdk (Windows)
        id: cache-sdk-win
        uses: actions/cache@v4
        with:
          path: third_party/rexglue-sdk/win-amd64
          key: rexglue-sdk-win-${{ env.REXGLUE_SDK_VERSION }}

      - name: Download rexglue-sdk
        if: steps.cache-sdk-win.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path third_party/rexglue-sdk | Out-Null
          Invoke-WebRequest -Uri "$env:SDK_URL_WIN" -OutFile sdk.zip
          Expand-Archive -Path sdk.zip -DestinationPath third_party/rexglue-sdk -Force
          Remove-Item sdk.zip

      - name: Configure
        shell: cmd
        run: |
          cmake -B build -G Ninja ^
            -DCMAKE_C_COMPILER=clang-cl ^
            -DCMAKE_CXX_COMPILER=clang-cl ^
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j $env:NUMBER_OF_PROCESSORS

      - name: Verify executable
        shell: pwsh
        run: |
          Get-Item build/realrecompile.exe | Select-Object Name, Length
          Write-Host "Build successful!"

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: realrecompile-win-amd64
          path: build/realrecompile.exe
