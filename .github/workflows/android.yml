name: Android Build

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  NDK_VERSION: r27c
  ANDROID_API: "28"

jobs:
  build-android:
    name: Build Android ARM64 (Vulkan)
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build cmake python3 unzip zip openjdk-17-jdk-headless
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0 ndk;27.2.12479018"

      - name: Set NDK path
        run: |
          NDK_PATH="$ANDROID_HOME/ndk/27.2.12479018"
          echo "ANDROID_NDK=$NDK_PATH" >> $GITHUB_ENV
          echo "NDK toolchain: $NDK_PATH/build/cmake/android.toolchain.cmake"
          $NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++ --version | head -1

      # ============================================
      # Step 1: Build rexglue-sdk from source for Android ARM64
      # ============================================
      - name: Cache rexglue-sdk Android
        id: cache-sdk-android
        uses: actions/cache@v4
        with:
          path: third_party/rexglue-sdk/android-arm64
          key: rexglue-sdk-android-arm64-v0.1.2-${{ hashFiles('scripts/patch_sdk_android.sh') }}

      - name: Clone rexglue-sdk source
        if: steps.cache-sdk-android.outputs.cache-hit != 'true'
        run: |
          git clone --recursive --depth 1 --branch v0.1.2 \
            https://github.com/rexglue/rexglue-sdk.git /tmp/rexglue-sdk-src
          # Ensure all submodules are fully initialized
          cd /tmp/rexglue-sdk-src
          git submodule update --init --recursive

      - name: Patch SDK for Android ARM64
        if: steps.cache-sdk-android.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/patch_sdk_android.sh
          bash scripts/patch_sdk_android.sh /tmp/rexglue-sdk-src

      - name: Configure SDK for Android
        if: steps.cache-sdk-android.outputs.cache-hit != 'true'
        run: |
          cmake -B /tmp/rexglue-sdk-build -S /tmp/rexglue-sdk-src -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API }} \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DREXGLUE_USE_VULKAN=ON \
            -DREXGLUE_BUILD_TESTS=OFF \
            -DSDL_INSTALL=OFF \
            -DSDL2_DISABLE_INSTALL=ON \
            -DSDL_TEST=OFF \
            -DCMAKE_THREAD_LIBS_INIT="" \
            -DTHREADS_HAVE_PTHREAD_ARG=TRUE \
            -DCMAKE_HAVE_THREADS_LIBRARY=1 \
            -DTHREADS_PREFER_PTHREAD_FLAG=OFF \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/third_party/rexglue-sdk/android-arm64

      - name: Build SDK for Android
        if: steps.cache-sdk-android.outputs.cache-hit != 'true'
        run: |
          echo "Building SDK with -j2 (1032 targets, ~40min)..."
          cmake --build /tmp/rexglue-sdk-build -j2

      - name: Install SDK
        if: steps.cache-sdk-android.outputs.cache-hit != 'true'
        run: |
          cmake --install /tmp/rexglue-sdk-build || {
            echo "::warning::cmake install had errors, manually copying artifacts..."
            SDK_DEST="${{ github.workspace }}/third_party/rexglue-sdk/android-arm64"
            mkdir -p "$SDK_DEST/lib" "$SDK_DEST/include" "$SDK_DEST/share"
            # Copy all built static libs
            find /tmp/rexglue-sdk-build -name '*.a' -exec cp {} "$SDK_DEST/lib/" \;
            # Copy SDK headers
            if [ -d "/tmp/rexglue-sdk-src/include" ]; then
              cp -r /tmp/rexglue-sdk-src/include/* "$SDK_DEST/include/"
            fi
            # Copy share directory (app templates, etc)
            if [ -d "/tmp/rexglue-sdk-src/share" ]; then
              cp -r /tmp/rexglue-sdk-src/share/* "$SDK_DEST/share/"
            fi
          }
          echo "SDK installed to: ${{ github.workspace }}/third_party/rexglue-sdk/android-arm64"
          ls -la "${{ github.workspace }}/third_party/rexglue-sdk/android-arm64/lib/" | head -20

          # Patch rexglueConfig.cmake: only remove find_dependency(SDL2) since
          # SDL2_DISABLE_INSTALL=ON means no SDL2Config.cmake was installed.
          # All other deps (fmt, spdlog, Snappy, etc.) have their cmake configs installed.
          SDK_CMAKE="${{ github.workspace }}/third_party/rexglue-sdk/android-arm64/lib/cmake/rexglue"
          if [ -f "$SDK_CMAKE/rexglueConfig.cmake" ]; then
            sed -i '/find_dependency(SDL2/d' "$SDK_CMAKE/rexglueConfig.cmake"
            echo "Patched rexglueConfig.cmake: removed find_dependency(SDL2)"
            echo "=== rexglueConfig.cmake contents ==="
            cat "$SDK_CMAKE/rexglueConfig.cmake"
            echo "=== end ==="
          fi

      # ============================================
      # Step 2: Build the project against Android SDK
      # ============================================
      - name: Configure project
        run: |
          cmake -B build-android -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API }} \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/third_party/rexglue-sdk/android-arm64" \
            -DCMAKE_FIND_ROOT_PATH="${{ github.workspace }}/third_party/rexglue-sdk/android-arm64" \
            -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH

      - name: Build project
        run: |
          echo "Building project with -j2 (17685 recompiled functions)..."
          cmake --build build-android -j2

      - name: Verify shared library
        run: |
          file build-android/librealrecompile.so
          ls -lh build-android/librealrecompile.so
          # Verify it's ARM64
          file build-android/librealrecompile.so | grep -q "aarch64" && echo "✓ ARM64 verified"

      # ============================================
      # Step 3: Package APK with Launcher UI
      # ============================================
      - name: Build APK
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/34.0.0"
          PLATFORM_JAR="$ANDROID_HOME/platforms/android-34/android.jar"

          mkdir -p apk-staging/lib/arm64-v8a
          cp build-android/librealrecompile.so apk-staging/lib/arm64-v8a/

          # Copy default.xex to assets if present
          mkdir -p apk-staging/assets
          if [ -f "default.xex" ]; then
            cp default.xex apk-staging/assets/
          fi

          # ---- Compile resources ----
          echo "Compiling Android resources..."
          mkdir -p apk-staging/compiled_res
          $BUILD_TOOLS/aapt2 compile --dir android/res -o apk-staging/compiled_res/

          # ---- Link resources + manifest into base APK ----
          echo "Linking APK..."
          $BUILD_TOOLS/aapt2 link \
            -o apk-staging/realrecompile-base.apk \
            --manifest android/AndroidManifest.xml \
            -I "$PLATFORM_JAR" \
            --min-sdk-version ${{ env.ANDROID_API }} \
            --target-sdk-version 34 \
            --auto-add-overlay \
            -R apk-staging/compiled_res/*.flat \
            --java apk-staging/gen

          # ---- Compile Java (LauncherActivity) ----
          echo "Compiling Java launcher..."
          mkdir -p apk-staging/classes
          find android/java -name "*.java" > apk-staging/java_sources.txt

          # Also compile generated R.java
          if [ -d "apk-staging/gen" ]; then
            find apk-staging/gen -name "*.java" >> apk-staging/java_sources.txt
          fi

          javac -source 11 -target 11 \
            -bootclasspath "$PLATFORM_JAR" \
            -classpath "$PLATFORM_JAR" \
            -d apk-staging/classes \
            @apk-staging/java_sources.txt

          # ---- Convert to DEX ----
          echo "Creating DEX..."
          $BUILD_TOOLS/d8 \
            --min-api ${{ env.ANDROID_API }} \
            --output apk-staging/ \
            apk-staging/classes/com/realrecompile/app/*.class

          # ---- Build final APK ----
          echo "Assembling final APK..."
          cp apk-staging/realrecompile-base.apk apk-staging/realrecompile-unaligned.apk

          # Add DEX + native libs + assets
          cd apk-staging
          zip -u realrecompile-unaligned.apk classes.dex
          zip -u realrecompile-unaligned.apk lib/arm64-v8a/librealrecompile.so
          [ -f assets/default.xex ] && zip -u realrecompile-unaligned.apk assets/default.xex
          cd ..

          # Align
          $BUILD_TOOLS/zipalign -f 4 \
            apk-staging/realrecompile-unaligned.apk \
            apk-staging/realrecompile-aligned.apk

          # Sign with debug key
          keytool -genkeypair -v -keystore /tmp/debug.keystore \
            -alias debug -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug, O=Debug, C=US" 2>/dev/null

          $BUILD_TOOLS/apksigner sign \
            --ks /tmp/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias debug \
            --out realrecompile.apk \
            apk-staging/realrecompile-aligned.apk

          ls -lh realrecompile.apk
          echo "APK built successfully!"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: realrecompile-android-arm64
          path: realrecompile.apk

      - name: Upload .so library
        uses: actions/upload-artifact@v4
        with:
          name: realrecompile-android-arm64-lib
          path: build-android/librealrecompile.so
